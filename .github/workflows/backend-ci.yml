name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Back_End

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Back_End/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax smoke check
        run: npm run ci:smoke

      - name: Run tests
        run: npm test
